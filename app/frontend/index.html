<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AgentUI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-title">
        <span>VietHuy/</span>
        <button id="themeToggle" class="theme-toggle" title="toggle light / dark theme">◐</button>
        <button id="newProjectBtn" class="new-project-btn" title="create new project">+ project</button>
      </div>
      <nav id="projectList" class="project-list"></nav>
      <div class="sidebar-divider"></div>
      <div class="tree-header">
        <span>Workspace</span>
        <span class="tree-hint" id="treeHint">⌥⌘C: copy path</span>
      </div>
      <div id="treeRoot" class="tree" tabindex="0"></div>
    </aside>
    <div class="sidebar-resizer" id="sidebarResizer" title="drag to resize sidebar"></div>

    <main class="workspace">
      <div class="tabs" id="tabs"></div>
      <div id="windowsRoot" class="windows-root">
        <div class="canvas-empty" id="canvasEmpty">Pick a project in the left sidebar</div>
      </div>
      <div id="taskbar" class="taskbar"></div>
    </main>
  </div>

  <button id="skillsTab" class="skills-tab" title="Skills — installed skills panel">⚡<span>Skills</span></button>
  <aside id="skillsPanel" class="skills-panel">
    <div class="skills-panel-head">
      <span>⚡ Installed skills</span>
      <button id="skillsClose" class="skills-close" title="hide panel">×</button>
    </div>
    <div class="skills-panel-hint">You stay in full control. Click <b>Use</b> to insert the skill call into the open agent chat — edit it, then send.</div>
    <div id="skillsList" class="skills-list"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
