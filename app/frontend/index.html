<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AgentUI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-title">VietHuy/</div>
      <nav id="projectList" class="project-list"></nav>
    </aside>

    <main class="main">
      <div class="tabs" id="tabs"></div>
      <div class="canvas" id="canvas">
        <svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="canvas-empty" id="canvasEmpty">Chọn project ở thanh bên trái</div>
        <div class="zoom-controls">
          <button id="zoomIn" title="Zoom in (scroll up)">+</button>
          <button id="zoomOut" title="Zoom out (scroll down)">−</button>
          <button id="zoomReset" title="Fit graph">⌖</button>
          <span class="zoom-level" id="zoomLevel">100%</span>
        </div>
      </div>
    </main>

    <aside class="rightpanel">
      <div class="rightpanel-header" id="rightHeader">Chưa chọn agent</div>
      <div class="messages" id="messages"></div>
      <div class="chatbox">
        <div class="chatbox-label">Chat session</div>
        <form id="chatForm">
          <textarea id="chatInput" rows="2" placeholder="Nhập prompt rồi Enter để gửi (Shift+Enter để xuống dòng)"></textarea>
          <button type="submit" id="chatSend">Gửi</button>
        </form>
        <div class="chat-status" id="chatStatus"></div>
      </div>
    </aside>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
