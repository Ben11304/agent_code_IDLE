<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AgentUI</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-title">
        <span>VietHuy/</span>
        <button id="newProjectBtn" class="new-project-btn" title="tạo dự án mới">+ project</button>
      </div>
      <nav id="projectList" class="project-list"></nav>
      <div class="sidebar-divider"></div>
      <div class="tree-header">
        <span>Workspace</span>
        <span class="tree-hint" id="treeHint">⌥⌘C: copy path</span>
      </div>
      <div id="treeRoot" class="tree" tabindex="0"></div>
    </aside>
    <div class="sidebar-resizer" id="sidebarResizer" title="kéo để đổi rộng sidebar"></div>

    <main class="workspace">
      <div class="tabs" id="tabs"></div>
      <div id="windowsRoot" class="windows-root">
        <div class="canvas-empty" id="canvasEmpty">Chọn project ở thanh bên trái</div>
      </div>
      <div id="taskbar" class="taskbar"></div>
    </main>
  </div>

  <button id="skillsTab" class="skills-tab" title="Skills — bảng skill đã cài">⚡<span>Skills</span></button>
  <aside id="skillsPanel" class="skills-panel">
    <div class="skills-panel-head">
      <span>⚡ Skills đã cài</span>
      <button id="skillsClose" class="skills-close" title="ẩn bảng">×</button>
    </div>
    <div class="skills-panel-hint">Bạn toàn quyền quyết định. Bấm <b>Dùng</b> để chèn lệnh gọi skill vào chat agent đang mở — tự sửa rồi gửi.</div>
    <div id="skillsList" class="skills-list"></div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
